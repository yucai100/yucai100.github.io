<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />

  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "",
        repo: "",
        loadNavbar: true,
        loadSidebar: true,
        subMaxLevel: 4,
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
        docsifyEnableCheckbox: {
          includeAll: true,
        },
        plugins: [
          function (hook) {
            hook.beforeEach(function (markdown) {
              // 自定义语法：[fold=标题] 折叠内容 [/fold]
              // 转换为 <details><summary>标题</summary> 折叠内容 </details>
              return markdown.replace(
                /\[fold=(.*?)\]([\s\S]*?)\[\/fold\]/g,
                function (match, title, content) {
                  // 注意：content 里的 Markdown 会被 Docsify 正常渲染
                  return `<details><summary>📃 ${title}</summary>\n\n${content}\n\n</details>`;
                },
              );
            });
          },
        ],
        "flexible-alerts": {
          style: "flat", // 可选: 'callout' (默认) 或 'flat'

          // 可选：自定义多语言标签
          note: {
            label: {
              "/": "注意",
            },
          },
          tip: {
            label: {
              "/": "提示",
            },
          },
          warning: {
            label: {
              "/": "警告",
            },
          },
          attention: {
            label: {
              "/": "重要",
            },
          },
        },
        copyCode: {
          buttonText: "点击复制",
          errorText: "错误",
          successText: "复制成功",
        },
      };
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-enable-checkbox@latest"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts@latest"></script>
    <script src="https://unpkg.com/docsify-copy-code@2"></script>
    <script src="//unpkg.com/prismjs/components/prism-bash.js"></script>
    <script src="//unpkg.com/prismjs/components/prism-yaml.js"></script>
    <script src="//unpkg.com/prismjs/components/prism-ini.js"></script>
  </body>
</html>
